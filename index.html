<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>รับแจ้งเตือน Web Push</title>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 50px; background-color: #f0f2f5; }
    button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #0084ff; color: white; border: none; border-radius: 10px; }
    #status { margin-top: 20px; font-weight: bold; }
    #token-display { margin-top: 15px; font-size: 11px; word-break: break-all; color: #666; background: #fff; padding: 10px; border: 1px solid #ddd; display: none; }
  </style>
</head>
<body>
  <h2>🔔 ระบบลงทะเบียนแจ้งเตือน</h2>
  <button id="btn-sub" onclick="requestPermission()">เปิดรับแจ้งเตือน</button>
  <div id="status">สถานะ: รอการกดปุ่ม...</div>
  <div id="token-display" id="token-display"></div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyASQaUu3QclUqig5Sx7j5ldCFe480TaeDQ",
      authDomain: "account-b893a.firebaseapp.com",
      projectId: "account-b893a",
      messagingSenderId: "881003637393",
      appId: "1:881003637393:web:d92682299ec638d50ded30"
    };

    firebase.initializeApp(firebaseConfig);
    const messaging = firebase.messaging();

    function requestPermission() {
      document.getElementById('status').innerText = "กำลังขออนุญาต...";
      Notification.requestPermission().then((permission) => {
        if (permission === 'granted') {
          navigator.serviceWorker.register('./firebase-messaging-sw.js').then((reg) => {
            messaging.getToken({ 
              vapidKey: 'BHr6Qr5xBS4QnOGqS7O2ASvZn8OqNYnEN28DOU06MDCZiSuJbtKJ7SRFdGkDOhf1-rz0HOBSUc-lNTjT9JkBk3Q',
              serviceWorkerRegistration: reg
            }).then((token) => {
              if (token) {
                document.getElementById('status').innerText = "ลงทะเบียนสำเร็จ!";
                document.getElementById('status').style.color = "green";
                const box = document.getElementById('token-display');
                box.style.display = "block";
                box.innerText = "Token: " + token;
              }
            });
          });
        }
      });
    }
  </script>
</body>
</html>
